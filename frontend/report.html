<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Lost or Found Item - Where IN THE World</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    .glow-text {
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.5) 0%, transparent 70%);
      filter: blur(80px);
      animation: float 10s infinite ease-in-out;
    }

    .blob2 {
      background: radial-gradient(circle, rgba(56,189,248,0.5) 0%, transparent 70%);
      animation-delay: 3s;
    }

    .blob3 {
      background: radial-gradient(circle, rgba(168,85,247,0.5) 0%, transparent 70%);
      animation-delay: 6s;
    }

    @keyframes float {
      0%,100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-60px) translateX(40px); }
    }

    .grid-bg {
      background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      position: absolute;
      inset: 0;
      z-index: 0;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-black via-blue-950 to-indigo-900 text-white min-h-screen overflow-x-hidden">
  <!-- Background Effects -->
  <div class="grid-bg"></div>
  <div class="blob top-10 left-10"></div>
  <div class="blob blob2 bottom-20 right-10"></div>
  <div class="blob blob3 top-1/2 left-1/3"></div>

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-10 py-6 bg-white/5 backdrop-blur-md border-b border-white/10 relative z-10">
    <a href="index.html" class="text-lg tracking-widest uppercase opacity-80 hover:opacity-100">Lost & Found</a>
    <div class="space-x-8 text-sm">
      <a href="index.html" class="hover:text-blue-400">Back to Home</a>
    </div>
  </nav>

  <!-- Form Section -->
  <div class="flex items-center justify-center min-h-screen px-4 py-8 relative z-10">
    <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 shadow-lg">
      
      <h2 class="text-3xl font-bold mb-2 glow-text">Report an Item</h2>
      <p class="text-gray-300 mb-6" id="reportTypeLabel">Tell us about the item</p>

      <form id="reportForm" class="space-y-4">
        
        <!-- Name -->
        <div>
          <label class="block text-sm font-medium mb-2">Your Name</label>
          <input 
            type="text" 
            id="name"
            placeholder="Enter your full name" 
            required 
            class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium mb-2">Phone Number</label>
          <input 
            type="tel" 
            id="phone"
            placeholder="Enter your phone number" 
            required 
            class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- Item Name -->
        <div>
          <label class="block text-sm font-medium mb-2">Item Name</label>
          <input 
            type="text" 
            id="itemName"
            placeholder="e.g., Black Wallet, Car Keys, Airpods" 
            required 
            class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-medium mb-2">Description</label>
          <textarea 
            id="description"
            placeholder="Describe the item in detail (color, brand, distinctive features, etc.)" 
            rows="3"
            required 
            class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
        </div>

        <!-- Location -->
        <div>
          <label class="block text-sm font-medium mb-2">Location</label>
          <input 
            type="text" 
            id="location"
            placeholder="Where was it lost/found?" 
            required 
            class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- Image Upload -->
        <div>
          <label class="block text-sm font-medium mb-2">Upload Image</label>
          <div class="relative">
            <input 
              type="file" 
              id="image"
              accept="image/*"
             
              class="w-full file:px-4 file:py-2 file:rounded-lg file:bg-blue-500 file:text-white file:border-0 file:cursor-pointer hover:file:bg-blue-600 px-4 py-2 bg-white/10 border border-white/20 text-white rounded-lg">
          </div>
          <p class="text-xs text-gray-400 mt-1">Upload a photo of the item</p>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="w-full px-6 py-3 mt-6 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 font-semibold text-white hover:from-blue-600 hover:to-purple-700 transition transform hover:scale-105 shadow-lg">
          Report Item
        </button>

        <!-- Back Link -->
        <a href="index.html" class="block text-center text-sm text-gray-400 hover:text-blue-400 mt-4">
          ← Back to Home
        </a>
      </form>
    </div>
  </div>

  <script src="js/report.js"></script>
</body>
</html>
