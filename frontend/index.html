<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Where IN THE World</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

  
   <style>
  body {
    font-family: 'Poppins', sans-serif;
  }

  .glow-text {
    background: linear-gradient(90deg, #60a5fa, #a78bfa, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(96,165,250,0.5);
  }

  /* Animated blobs */
  .blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(99,102,241,0.5) 0%, transparent 70%);
    filter: blur(80px);
    animation: float 10s infinite ease-in-out;
  }

  .blob2 {
    background: radial-gradient(circle, rgba(56,189,248,0.5) 0%, transparent 70%);
    animation-delay: 3s;
  }

  .blob3 {
    background: radial-gradient(circle, rgba(168,85,247,0.5) 0%, transparent 70%);
    animation-delay: 6s;
  }

  @keyframes float {
    0%,100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-60px) translateX(40px); }
  }

  /* Grid overlay */
  .grid-bg {
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    position: absolute;
    inset: 0;
    z-index: 0;
  }
</style>
  
</head>

<body class="bg-gradient-to-br from-black via-blue-950 to-indigo-900 text-white min-h-screen overflow-x-hidden">

  <!-- Navbar -->
   <!-- Background Effects -->
<div class="grid-bg"></div>

<div class="blob top-10 left-10"></div>
<div class="blob blob2 bottom-20 right-10"></div>
<div class="blob blob3 top-1/2 left-1/3"></div>
  <nav class="flex justify-between items-center px-10 py-6 bg-white/5 backdrop-blur-md border-b border-white/10">
    <h1 class="text-lg tracking-widest uppercase opacity-80">Lost & Found</h1>
    <div class="space-x-8 text-sm">
      <a href="#" class="hover:text-blue-400">Login</a>
      <a href="#" class="hover:text-blue-400">Register</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="flex flex-col items-center justify-center text-center mt-24 px-4">

    <!-- MAIN TITLE -->
    <h1 class="text-6xl md:text-7xl font-extrabold leading-tight tracking-tight glow-text">
      where IN THE world
    </h1>

    <!-- SUBTITLE -->
    <p class="mt-6 text-gray-300 max-w-xl text-lg">
      A smart, minimal and powerful lost & found platform built for your campus.
    </p>

    <!-- BUTTONS -->
    <div class="flex gap-10 mt-12 flex-wrap justify-center">

  <!-- LOST -->
  <div onclick="goToReport('lost')" 
    class="px-8 py-6 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 shadow-lg hover:scale-105 transition cursor-pointer w-72 text-center">

    <h3 class="text-xl font-bold text-red-400 mb-2">
      Report Lost
    </h3>

    <p class="text-gray-300 text-sm">
      Tell us what you lost and where you last saw it
    </p>

  </div>

  <!-- FOUND -->
  <div onclick="goToReport('found')" 
    class="px-8 py-6 rounded-2xl bg-white/10 backdrop-blur-md border border-white/20 shadow-lg hover:scale-105 transition cursor-pointer w-72 text-center">

    <h3 class="text-xl font-bold text-green-400 mb-2">
      Report Found
    </h3>

    <p class="text-gray-300 text-sm">
      Help someone recover their item by reporting it here
    </p>

  </div>

</div>
  </section>

 
  <!-- SEARCH BAR -->
<div class="flex justify-center mt-12 px-4">
  <div class="relative w-full max-w-xl">

    <!-- Glow effect -->
    <div class="absolute inset-0 bg-gradient-to-r from-blue-500 via-purple-500 to-cyan-400 blur-xl opacity-30 rounded-full"></div>

    <!-- Input -->
    <input 
      id="search"
      type="text"
      placeholder="Search lost or found items..."
      onkeyup="filterItems()"
      class="relative w-full px-6 py-3 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-lg"
    />

  </div>
</div>

  <!-- ITEMS -->
  <div class="max-w-6xl mx-auto mt-16 px-6">
    <h2 class="text-2xl font-semibold mb-6 text-center opacity-80">Recent Reports</h2>

    <div id="items" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
